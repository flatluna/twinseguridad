name: CI/CD - Build & Deploy TwinSeguridad

# ============================================================
# Se ejecuta en cada push a main o pull request a main
# ============================================================
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ============================================================
# SECRETOS REQUERIDOS EN GITHUB (Settings > Secrets > Actions):
#
#   AZURE_FUNCTIONAPP_PUBLISH_PROFILE
#     -> Se obtiene del Azure Portal:
#        Function App > Get publish profile (descargar XML)
#        Copiar TODO el contenido del XML y pegarlo como secret
#
# LAS APP SETTINGS (keys, endpoints, etc.) SE CONFIGURAN
# DIRECTAMENTE EN AZURE PORTAL > Function App > Configuration
# > Application settings. NO van en el workflow.
#
# Settings requeridos en Azure Portal > Application settings:
#   AZURE_OPENAI_ENDPOINT
#   AZURE_OPENAI_API_KEY
#   AZURE_OPENAI_CHAT_DEPLOYMENT_NAME
#   AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME
#   AZURE_OPENAI_TRAINING_DEPLOYMENT_NAME
#   COSMOS_ENDPOINT
#   COSMOS_KEY
#   COSMOS_DATABASE_NAME
#   SEGURIDAD_COSMOS_ENDPOINT
#   SEGURIDAD_COSMOS_KEY
#   SEGURIDAD_COSMOS_DATABASE
#   SEGURIDAD_COSMOS_CONTAINER
# ============================================================

env:
  AZURE_FUNCTIONAPP_NAME: 'twinseguridad-fx'
  DOTNET_VERSION: '9.0.x'

jobs:
  # ??????????????????????????????????????????????
  #  JOB 1: Build
  # ??????????????????????????????????????????????
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: twinseguridad-build
          path: ./publish/
          retention-days: 7

  # ??????????????????????????????????????????????
  #  JOB 2: Deploy a Azure Functions
  #  Solo en push a main (no en pull requests)
  # ??????????????????????????????????????????????
  deploy:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: twinseguridad-build
          path: ./publish

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false
